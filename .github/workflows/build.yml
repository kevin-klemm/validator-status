name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: validator-status
  TEST_SCHEME: validator-status-tests
  XCODEPROJ: validator-status.xcodeproj
  APP_NAME: Validator Status.app

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "::error::No Xcode 16.x found"
            exit 1
          fi
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      # ── Cache derived data to speed up incremental builds ──
      - name: Restore build cache
        id: cache-derived
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/DerivedData
          key: deriveddata-${{ runner.os }}-${{ hashFiles('project.yml', '**/*.swift') }}
          restore-keys: |
            deriveddata-${{ runner.os }}-

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -destination "platform=macOS" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Run tests
        run: |
          xcodebuild test \
            -project "$XCODEPROJ" \
            -scheme "$TEST_SCHEME" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -destination "platform=macOS" \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      - name: Locate app bundle
        id: app
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData/Build/Products" -name "$APP_NAME" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::$APP_NAME not found in DerivedData"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app bundle at $APP_PATH"

      - name: Package unsigned CI app
        run: |
          ditto -c -k --keepParent "${{ steps.app.outputs.app_path }}" Validator-Status-unsigned.zip
          echo "Uploaded artifact: unsigned CI build for inspection only." >> "$GITHUB_STEP_SUMMARY"
          echo "Gatekeeper will block this artifact after download unless you sign and notarize it separately." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unsigned CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Validator-Status-unsigned
          path: Validator-Status-unsigned.zip
          retention-days: 14
