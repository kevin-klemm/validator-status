name: ValidatorStatus
options:
  bundleIdPrefix: com.validatorstatus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ValidatorStatus:
    type: application
    platform: macOS
    sources:
      - path: HostApp
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: "Validator Status"
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.app
        INFOPLIST_FILE: HostApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: HostApp/HostApp.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ValidatorStatusWidget
        embed: true

  ValidatorStatusWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.app.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

  ValidatorStatusTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ValidatorStatus
        embed: false
