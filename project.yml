name: validator-status
options:
  bundleIdPrefix: com.validatorstatus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  validator-status:
    build:
      targets:
        validator-status: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug

  validator-status-tests:
    build:
      targets:
        validator-status: all
        validator-status-tests: [test]
    test:
      config: Debug
      targets:
        - validator-status-tests

targets:
  validator-status:
    type: application
    platform: macOS
    sources:
      - path: HostApp
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: "Validator Status"
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.app
        INFOPLIST_FILE: HostApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: HostApp/HostApp.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: validator-status-widget
        embed: true

  validator-status-widget:
    type: app-extension
    platform: macOS
    sources:
      - path: Widget
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.app.widget
        INFOPLIST_FILE: Widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: Widget/Widget.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"

  validator-status-tests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.validatorstatus.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: ""
        BUNDLE_LOADER: ""
